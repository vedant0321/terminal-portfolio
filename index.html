  --purple:#c792ea;        /* keywords · ML terms        */
  --amber:#ffc66d;         /* strings · highlights       */
  --red:#ff6b7a;           /* errors                     */

  --sel:#3cf0a4;
  --scan-opacity:.05;
}

body[data-theme="matrix"]{
  --bg:#010604; --bg-term:#02100a; --bg-bar:#03150d; --bg-raise:#061f13;

body[data-theme="paper"]{

/* ============================================================
   BASE
   ============================================================ */
*{box-sizing:border-box}
html,body{height:100%}
body{

  color:var(--text);
  font-family:var(--mono);
  font-size:13.5px;
  line-height:1.55;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  transition:background .25s ease,color .25s ease;
}
::selection{background:var(--sel);color:var(--bg-term)}

a{color:var(--cyan);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--cyan) 55%,transparent)}
a:hover{border-bottom-style:solid}
a:focus-visible,.cmd-link:focus-visible,.chip:focus-visible,button:focus-visible{
  outline:2px solid var(--green);outline-offset:2px;border-radius:2px;
}

/* ============================================================
   TERMINAL WINDOW
   ============================================================ */
.terminal{
  position:relative;
  width:min(1060px,100%);
  height:min(860px,calc(100dvh - 36px));
  display:flex;flex-direction:column;
  background:var(--bg-term);
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.02) inset;
  overflow:hidden;
}

/* CRT atmosphere — subtle scanlines + vignette */
.terminal::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,
    rgba(255,255,255,var(--scan-opacity)) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}
.terminal::after{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(120% 90% at 50% 30%, transparent 60%, rgba(0,0,0,.28) 100%);
}
body[data-theme="paper"] .terminal::after{background:none}

/* ---- title bar ---- */
.titlebar{
  flex:none;display:flex;align-items:center;gap:12px;
  height:42px;padding:0 14px;
  background:var(--bg-bar);
  border-bottom:1px solid var(--border);
  user-select:none;

.dots{display:flex;gap:8px}
.dot{width:12px;height:12px;border-radius:50%;border:none;padding:0;cursor:pointer;

.title{

.theme-btn:hover{color:var(--green);border-color:var(--green)}

.term-body{

.line{white-space:pre-wrap;word-break:break-word;min-height:1.55em}

function lev(a, b){
  const m = a.length, n = b.length;
  const d = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      d[i][j] = Math.min(d[i-1][j] + 1, d[i][j-1] + 1, d[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1));
  return d[m][n];
}

function dispatch(line){
  const parts = line.trim().split(/\s+/);
  let name = (parts.shift() || "").toLowerCase();
  if (ALIASES[name]) name = ALIASES[name];
  const c = CMDS[name];
  if (c){ return c.fn(parts); }
  const pool = [...Object.keys(CMDS), ...Object.keys(ALIASES)];
  let best = null, bd = 3;
  for (const p of pool){ const d = lev(name, p); if (d < bd){ bd = d; best = p; } }
  print(`<span class="c-red">command not found:</span> ${esc(name)}` +
        (best ? ` <span class="dim">— did you mean</span> ${cmdLink(ALIASES[best] || best)}<span class="dim">?</span>` : ""));
  if (!best) print(`<span class="dim">type</span> ${cmdLink("help")} <span class="dim">to see what I respond to</span>`);
}

function execute(line){
  const t = line.trim();
  echoCmd(t);
  if (t){
    if (history[history.length - 1] !== t) history.push(t);
    hIdx = history.length;
    dispatch(t);
  }
  cli.value = ""; sync(); scroll();
}

function runFromUI(cmd){
  if (busy) return;
  execute(cmd);
  if (canHover) cli.focus({ preventScroll: true });
}

/* ---------- input plumbing ---------- */
function sync(){ typed.textContent = cli.value; }

cli.addEventListener("input", sync);

cli.addEventListener("keydown", (e) => {
  if (e.key === "Enter"){
    e.preventDefault();
    if (busy){ return; }
    execute(cli.value);
  } else if (e.key === "ArrowUp"){
    e.preventDefault();
    if (history.length){ hIdx = Math.max(0, hIdx - 1); cli.value = history[hIdx] || ""; sync(); }
  } else if (e.key === "ArrowDown"){
    e.preventDefault();
    if (history.length){
      hIdx = Math.min(history.length, hIdx + 1);
      cli.value = hIdx === history.length ? "" : history[hIdx]; sync();
    }
  } else if (e.key === "Tab"){
    e.preventDefault(); complete();
  } else if (e.key === "l" && e.ctrlKey){
    e.preventDefault(); out.innerHTML = "";
  } else if (e.key === "c" && e.ctrlKey){
    e.preventDefault(); print(PS1 + esc(cli.value) + "^C"); cli.value = ""; sync();
  }
});

function complete(){
  const v = cli.value;
  let pool, addSpace = true;
  if (/^theme\s+\S*$/.test(v)){ pool = THEMES; addSpace = false; }
  else if (/^cat\s+\S*$/.test(v)){ pool = ["about.txt","contact.md","experience.log","projects/","resume.pdf","skills.json"]; addSpace = false; }
  else { pool = [...new Set([...Object.keys(CMDS), ...Object.keys(ALIASES)])]; }
  const parts = v.split(/\s+/);
  const last = parts[parts.length - 1] || "";
  if (!last) return;
  const hits = pool.filter(p => p.startsWith(last));
  if (hits.length === 1){
    parts[parts.length - 1] = hits[0];
    cli.value = parts.join(" ") + (addSpace ? " " : "");
    sync();
  } else if (hits.length > 1){
    print(`<span class="dim">${esc(hits.join("   "))}</span>`);
  }
}

  print(`Hi, I'm <span class="c-amber b">${esc(PROFILE.name)}</span> <span class="dim">·</span> ${esc(PROFILE.role)} <span class="dim">·</span> ${esc(PROFILE.loc)}`);
  print(`<span class="dim">I turn messy data into production models — and this terminal into a résumé.</span>`);

  iline.style.visibility = "visible";
  if (canHover) cli.focus({ preventScroll: true });

  await wait(reduced ? 0 : 420);

  execute("help");
}
